<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слайд 5</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0;">
    <div style="width: 1280px; height: 720px; background-color: #FFFFFF; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 32px;">
        <h1 style="font-family: 'Montserrat', sans-serif; font-size: 48px; color: #007BFF; text-align: center; margin-bottom: 24px; line-height: 1.2;">
            Будущее уже здесь: ИИ как двигатель роста
        </h1>
        <p style="font-family: 'Open Sans', sans-serif; font-size: 28px; color: #1A1A1A; text-align: center; margin-bottom: 48px; max-width: 960px; line-height: 1.5;">
            Инвестиции в ИИ — это инвестиции в будущее и конкурентоспособность вашего бизнеса.
        </p>
        <div style="display: flex; justify-content: center; align-items: center; gap: 24px;">
            <button style="background-color: #007BFF; color: #FFFFFF; border: none; padding: 16px 32px; font-family: 'Open Sans', sans-serif; font-size: 20px; font-weight: 600; border-radius: 8px; cursor: pointer; text-decoration: none; transition: background-color 0.3s ease;">
                Начать пилотный проект
            </button>
            <button style="background-color: transparent; color: #007BFF; border: 2px solid #007BFF; padding: 14px 30px; font-family: 'Open Sans', sans-serif; font-size: 20px; font-weight: 600; border-radius: 8px; cursor: pointer; text-decoration: none; transition: background-color 0.3s ease, color 0.3s ease;">
                Связаться с нами
            </button>
        </div>
        <p style="font-family: 'Open Sans', sans-serif; font-size: 18px; color: #5C5C5C; text-align: center; margin-top: 48px;">
            Есть вопросы? Мы готовы на них ответить!
        </p>
    </div>
</body>
</html>
