# ═══════════════════════════════════════════════════════
# Docker Compose — AI Presentation Generator (Full Stack)
# Frontend (nginx) + Backend (FastAPI) + PostgreSQL
# ═══════════════════════════════════════════════════════
#
# Usage:
#   Production:   docker compose up -d
#   Development:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Rebuild:      docker compose up -d --build
#   Logs:         docker compose logs -f
#   Stop:         docker compose down
#   Reset DB:     docker compose down -v
#
# ═══════════════════════════════════════════════════════

services:
  # ── PostgreSQL Database ──────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: aipres-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aipres}
      POSTGRES_USER: ${POSTGRES_USER:-aipres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aipres_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aipres} -d ${POSTGRES_DB:-aipres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend API (FastAPI) ────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aipres-api
    environment:
      # App
      APP_NAME: "AI Presentation Generator"
      DEBUG: ${DEBUG:-false}

      # Database (PostgreSQL)
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-aipres}:${POSTGRES_PASSWORD:-aipres_secret}@db:5432/${POSTGRES_DB:-aipres}"

      # JWT Auth
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: "HS256"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}

      # CORS
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost"]'

      # LLM
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}

      # Legacy keys (used by engine directly)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - api-storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend (nginx + SPA) ───────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: aipres-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres-data:
    driver: local
  api-storage:
    driver: local
